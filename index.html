<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Affiliate & UGC Prompt Generator</title>
<style>
  :root {
    --gold: #c8a060;
    --gold2: #e8b840;
    --dark: #0a0a0f;
    --bg: linear-gradient(160deg, #0a0a0f 0%, #111118 60%, #0d1020 100%);
    --header-bg: linear-gradient(90deg, #12101a, #0d1525);
    --card-border: rgba(255,255,255,0.07);
    --card-bg: rgba(255,255,255,0.02);
    --text-dim: #8899aa;
    --text-main: #e8e0d0;
    --text-code: #d0c8b0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Georgia', serif;
    color: var(--text-main);
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #app { width: 100%; display: flex; flex-direction: column; align-items: center; }

  /* Header */
  .header {
    width: 100%;
    background: var(--header-bg);
    border-bottom: 1px solid rgba(255,200,100,0.12);
    padding: 24px 20px 18px;
    text-align: center;
  }
  .header-eyebrow {
    font-size: 10px; letter-spacing: 6px; color: var(--gold);
    text-transform: uppercase; margin-bottom: 8px;
  }
  .header h1 {
    font-size: clamp(20px,5vw,32px);
    background: linear-gradient(135deg,#f0c060,#e0a040,#c0784a);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 400; letter-spacing: 2px;
  }
  .header p { margin: 6px 0 0; font-size: 11px; color: var(--text-dim); letter-spacing: 1px; }

  /* Progress */
  .progress-wrap {
    width: 100%; max-width: 620px; padding: 16px 18px 0;
  }
  .progress-bar { display: flex; gap: 3px; }
  .progress-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  .progress-line {
    height: 2.5px; width: 100%; border-radius: 2px;
    background: rgba(255,255,255,0.07);
    transition: background 0.3s;
  }
  .progress-line.active {
    background: linear-gradient(90deg, var(--gold), var(--gold2));
  }
  .progress-label {
    font-size: 8px; color: #334455; letter-spacing: 1px; text-transform: uppercase;
  }
  .progress-label.current { color: var(--gold); }

  /* Body */
  .body { width: 100%; max-width: 620px; padding: 0 18px 48px; }

  /* Section */
  .sec { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
  .sec-sub {
    font-size: 10px; letter-spacing: 4px; color: var(--gold);
    text-transform: uppercase; margin-bottom: 5px;
  }
  .sec h2 { font-size: 20px; font-weight: 400; color: #f0e0c0; letter-spacing: 1px; }

  /* Card */
  .card {
    display: flex; align-items: center; gap: 14px;
    padding: 13px 16px; border-radius: 12px; cursor: pointer;
    border: 1px solid var(--card-border);
    background: var(--card-bg);
    transition: all 0.17s ease;
  }
  .card.selected { background: rgba(200,160,80,0.09); }
  .card-label { font-size: 15px; font-weight: 500; }
  .card-sub { font-size: 11px; color: var(--text-dim); }
  .card-inner { display: flex; flex-direction: column; gap: 2px; }

  /* AI Generator grid */
  .ai-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .ai-card {
    padding: 14px; border-radius: 10px; cursor: pointer;
    border: 1px solid var(--card-border);
    background: rgba(255,255,255,0.02);
    transition: all 0.18s;
  }
  .ai-card.selected {
    background: rgba(200,160,80,0.1);
    border-color: var(--gold);
  }
  .ai-card-label { font-size: 13px; font-weight: 500; color: #ccc; margin-bottom: 4px; }
  .ai-card.selected .ai-card-label { color: #e8c070; }
  .ai-card-type { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }

  /* Upload zone */
  .upload-zone {
    border: 1.5px dashed rgba(200,160,80,0.25);
    border-radius: 12px; padding: 40px 20px;
    text-align: center; cursor: pointer;
    background: rgba(255,255,255,0.02);
    transition: all 0.2s;
  }
  .upload-zone.drag {
    border-color: var(--gold);
    background: rgba(200,160,80,0.06);
  }
  .upload-icon { font-size: 32px; margin-bottom: 10px; }
  .upload-title { font-size: 15px; color: var(--gold); margin-bottom: 6px; }
  .upload-hint { font-size: 12px; color: #445566; }
  .skip-btn {
    text-align: center; padding: 14px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.02);
    cursor: pointer; color: #667788; font-size: 13px; letter-spacing: 1px;
    font-family: inherit;
  }

  /* Field */
  .field { display: flex; flex-direction: column; gap: 0; }
  .field label {
    font-size: 11px; color: var(--text-dim); letter-spacing: 1px;
    text-transform: uppercase; margin-bottom: 7px; display: block;
  }
  .field input {
    width: 100%; padding: 12px 14px; border-radius: 9px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    color: #e8e0d0; font-size: 13px; outline: none;
    font-family: inherit;
  }
  .field input::placeholder { color: #445566; }

  /* Thumbnail */
  .thumb {
    border-radius: 8px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    max-height: 130px; margin-bottom: 2px;
  }
  .thumb img { width: 100%; object-fit: cover; display: block; max-height: 130px; }

  /* Nav buttons */
  .nav { display: flex; gap: 10px; margin-top: 22px; }
  .btn-back {
    flex: 1; padding: 13px; border-radius: 10px; cursor: pointer;
    background: transparent; border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-dim); font-size: 13px; letter-spacing: 1px;
    font-family: inherit;
  }
  .btn-next {
    flex: 3; padding: 13px; border-radius: 10px;
    border: none; font-size: 14px; font-weight: 700;
    letter-spacing: 2px; font-family: inherit; transition: all 0.2s;
    cursor: pointer;
  }
  .btn-next.enabled {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: #1a1005;
  }
  .btn-next.disabled {
    background: rgba(255,255,255,0.04);
    color: #445566; cursor: not-allowed;
  }

  /* Confirm rows */
  .confirm-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 9px 12px; background: rgba(255,255,255,0.03);
    border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);
  }
  .confirm-key { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .confirm-val { font-size: 12px; color: #e0d0b0; font-weight: 500; max-width: 58%; text-align: right; }
  .confirm-val.ok { color: #88cc88; }

  /* Loading */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 40px; height: 40px;
    border: 2px solid rgba(200,160,80,0.3);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading-center {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding-top: 80px; gap: 20px;
  }
  .loading-text { font-size: 13px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }

  /* Result */
  .result-img { margin-top: 20px; border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); max-height: 180px; }
  .result-img img { width: 100%; object-fit: cover; display: block; max-height: 180px; }
  .tabs { display: flex; gap: 8px; margin-top: 18px; }
  .tab-btn {
    flex: 1; padding: 9px 4px; border-radius: 8px; cursor: pointer;
    font-size: 12px; letter-spacing: 1px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    color: var(--text-dim); font-family: inherit; transition: all 0.15s;
  }
  .tab-btn.active {
    border-color: rgba(200,160,80,0.5);
    background: rgba(200,160,80,0.12);
    color: var(--gold);
  }
  .output-wrap { margin-top: 10px; display: flex; flex-direction: column; gap: 10px; }
  .panel { position: relative; }
  .panel-label { font-size: 10px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; margin-bottom: 6px; }
  .panel pre {
    background: rgba(0,0,0,0.35); border: 1px solid rgba(200,160,80,0.12);
    border-radius: 12px; padding: 14px 14px 48px; font-size: 12px; line-height: 1.75;
    color: var(--text-code); white-space: pre-wrap; word-break: break-word;
    font-family: 'Courier New', monospace; max-height: 28vh; overflow-y: auto; margin: 0;
  }
  .panel pre.tall { max-height: 55vh; padding-bottom: 52px; }
  .copy-btn {
    position: absolute; bottom: 12px; right: 12px;
    padding: 5px 14px; border-radius: 6px; cursor: pointer;
    background: rgba(200,160,80,0.15);
    border: 1px solid rgba(200,160,80,0.3);
    color: var(--gold); font-size: 11px; letter-spacing: 1px; font-family: inherit;
    transition: all 0.2s;
  }
  .copy-btn.copied {
    background: rgba(100,200,100,0.2);
    border-color: rgba(100,200,100,0.4);
    color: #88ee88;
  }
  .reset-btn {
    margin-top: 14px; width: 100%; padding: 12px; border-radius: 10px;
    background: transparent; border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-dim); cursor: pointer; font-size: 13px;
    letter-spacing: 1px; font-family: inherit;
  }
  .photo-ok {
    font-size: 12px; color: #55aa77; padding: 8px 12px; border-radius: 8px;
    background: rgba(80,180,100,0.08); border: 1px solid rgba(80,180,100,0.2); margin-bottom: 4px;
  }

  /* Hidden file input */
  #file-input { display: none; }
</style>
</head>
<body>
<input type="file" id="file-input" accept="image/*" />
<div id="app"></div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const NICHES = [
  { id:"beauty",  label:"Beauty & Skincare",     emoji:"✨", color:"#f4a7b9" },
  { id:"home",    label:"Home & Lifestyle",       emoji:"🏠", color:"#a8d8a8" },
  { id:"health",  label:"Health & Wellness",      emoji:"💪", color:"#ffd580" },
  { id:"fashion", label:"Fashion & Accessories",  emoji:"👗", color:"#b5c9f7" },
];
const PLATFORMS = [
  { id:"tiktok",  label:"TikTok",           ratio:"9:16",    duration:"15–60 sec" },
  { id:"reels",   label:"Instagram Reels",  ratio:"9:16",    duration:"15–90 sec" },
  { id:"youtube", label:"YouTube Shorts",   ratio:"9:16",    duration:"up to 60 sec" },
  { id:"feed",    label:"Instagram Feed",   ratio:"1:1/4:5", duration:"Static / Carousel" },
  { id:"multi",   label:"Multi-platform",   ratio:"Adaptive",duration:"Flexible" },
];
const CONTENT_TYPES = [
  { id:"review",       label:"Product Review",           icon:"⭐", desc:"Unboxing, first impressions, real results" },
  { id:"before_after", label:"Before & After",           icon:"🔄", desc:"Visual transformation before and after" },
  { id:"lifestyle",    label:"Lifestyle / Storytelling", icon:"🎬", desc:"Product integrated into everyday life" },
];
const AI_GENERATORS = [
  { id:"kling",      label:"Kling AI",               type:"video" },
  { id:"runway",     label:"Runway Gen-3",            type:"video" },
  { id:"sora",       label:"Sora (OpenAI)",           type:"video" },
  { id:"midjourney", label:"Midjourney",              type:"image" },
  { id:"flux",       label:"Flux / Stable Diffusion", type:"image" },
  { id:"pika",       label:"Pika Labs",               type:"video" },
  { id:"auto",       label:"Flexible / Auto",         type:"both" },
];
const FASHION_SUBCATEGORIES = [
  { id:"clothing", label:"Clothing",           emoji:"👗", desc:"Tops, shirts, dresses, outerwear, pants" },
  { id:"bag",      label:"Bags & Accessories", emoji:"👜", desc:"Handbag, slingbag, tote, wallet, accessories" },
];
const TONES = [
  { id:"energetic",   label:"Energetic & Viral",         style:"fast cuts, bold color grading, high saturation, dynamic handheld camera movement, bright warm tones, pop aesthetic, shot on smartphone, handheld camera, natural shaky movement, amateurish UGC feel, slightly imperfect framing, real-person POV, no tripod, organic motion blur on movement" },
  { id:"elegant",     label:"Elegant & Premium",         style:"gentle handheld sway, soft bokeh, luxury color palette ivory champagne deep green, soft natural window lighting, shot on smartphone, handheld camera, natural shaky movement, amateurish UGC feel, slightly imperfect framing, real-person POV, no tripod, organic motion blur on movement" },
  { id:"warm",        label:"Warm & Personal",           style:"handheld natural movement, golden hour lighting, candid feel, warm tones, intimate close-ups, soft vignette, shot on smartphone, handheld camera, natural shaky movement, amateurish UGC feel, slightly imperfect framing, real-person POV, no tripod, organic motion blur on movement" },
  { id:"educational", label:"Educational & Informative", style:"slightly shaky close-up shots, natural daylight, clear product detail, neutral tones, held in one hand while filming, shot on smartphone, handheld camera, natural shaky movement, amateurish UGC feel, slightly imperfect framing, real-person POV, no tripod, organic motion blur on movement" },
];
const STEPS = ["Photo","Niche","Category","Platform","Content","AI Tool","Tone","Product","Confirm"];

// ─── STATE ───────────────────────────────────────────────────────────────────
let state = {
  step: 0,
  imgB64: null,
  imgSrc: null,
  isDrag: false,
  loading: false,
  result: null,
  activeTab: "intro",
  copied: "",
  form: { niche:"", fashionSub:"", platform:"", contentType:"", aiGen:"", tone:"", productName:"", productBenefit:"" }
};

function set(k,v) { state.form[k] = v; render(); }
function setState(updates) { Object.assign(state, updates); render(); }

// ─── PROMPT BUILDER (static fallback) ────────────────────────────────────────
function buildStaticPrompt({ niche, fashionSub, platform, contentType, aiGen, tone, productName, productBenefit }) {
  const nicheObj    = NICHES.find(n => n.id === niche);
  const platformObj = PLATFORMS.find(p => p.id === platform);
  const contentObj  = CONTENT_TYPES.find(c => c.id === contentType);
  const aiObj       = AI_GENERATORS.find(a => a.id === aiGen);
  const toneObj     = TONES.find(t => t.id === tone);

  const nicheLabel    = nicheObj?.label    || "Product";
  const platformLabel = platformObj?.label || "Multi-platform";
  const contentLabel  = contentObj?.label  || "Content";
  const aiLabel       = aiObj?.label       || "AI Generator";
  const toneLabel     = toneObj?.label     || "Natural";
  const visualStyle   = toneObj?.style     || TONES[2].style;
  const ratio         = platformObj?.ratio    || "9:16";
  const duration      = platformObj?.duration || "Flexible";
  const product       = productName    || "[Product Name]";
  const benefit       = productBenefit || "[Key Product Benefit]";

  const NEG_SHORT = `no speech, no talking, no open mouth, no lip movement, no text overlay, no studio lighting, no tripod, no stabilizer, no gimbal, no watermark`;
  const isKling = aiGen === "kling";

  const klingify = (shot) => {
    const noTs = shot.replace(/^\[\d+:\d+[-–]\d+:\d+\]\s*/, "");
    const sentences = noTs.split(/[.—]+/).filter(s => s.trim().length > 5).slice(0, 2);
    const joined = sentences.join(". ").trim();
    const words = joined.split(/\s+/);
    return (words.length > 40 ? words.slice(0, 40).join(" ") + "..." : joined);
  };

  const SCENE_NEG = `❌ NEGATIVE PROMPT:\nno talking, no speaking, no open mouth, no mouth movement, no dialogue, no lip sync, no lip movement, no voiceover, no verbal communication — IF any model appears: must NOT speak, must NOT open mouth, must be completely silent; no influencer pose, no studio lighting, no tripod, no gimbal, no watermark`;

  const makeScene = (num, label, anchor, sub1, sub2) => {
    if (isKling) {
      return `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\nSCENE ${num} — ${label}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n🖼️ IMAGE ANCHOR (upload to Kling):\n${anchor}\n\n🎬 KLING PROMPT — Shot A:\n${klingify(sub1)}\n\n🎬 KLING PROMPT — Shot B:\n${klingify(sub2)}\n\n❌ NEGATIVE: ${NEG_SHORT}`;
    }
    return `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\nSCENE ${num} — ${label}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n🖼️ IMAGE ANCHOR:\n${anchor}\n\n\`\`\`\n${sub1}\n\n${sub2}\n\`\`\`\n\n${SCENE_NEG}`;
  };

  const r = ratio.replace("/",":");

  // Fashion clothing 4-scene
  const fashionShots = [
    makeScene(1,"INTRO — CLOTHING ON TABLE",
      `Photorealistic, shot on smartphone, handheld UGC — ${product} neatly laid flat on a wooden table or bed surface, natural daylight from window illuminating fabric texture and details. Slightly imperfect framing, no mannequin, no hanger. ${visualStyle}. --ar ${r} --style raw --v 6.1`,
      `[0:00-0:04] Handheld smartphone — slow side-to-side pan across ${product} laid on a table. Natural window light highlights fabric texture. Slight organic sway, no gimbal.`,
      `[0:04-0:08] Camera dips closer to fabric surface — close-up on texture, stitching, or color detail. Autofocus hunts then locks on best detail. Warm ambient light.`
    ),
    makeScene(2,"MODEL SELF-RECORDING",
      `Photorealistic, selfie-mode smartphone shot — person wearing ${product} holding phone at arm's length toward their own face/body, recording themselves, indoor or semi-outdoor setting, natural ambient light, authentic self-filmed UGC feel. ${visualStyle}. --ar ${r} --style raw --v 6.1`,
      `[0:00-0:04] Model holds smartphone at arm's length, angled toward themselves — selfie-style self-recording. ${product} clearly visible on their body. Camera arm slightly unstable, natural shake. Model looks at the phone lens, NOT speaking.`,
      `[0:04-0:08] Model slowly lowers the phone from face-level down to chest/waist level — revealing more of the ${product} outfit. One hand holds the phone, the other naturally hangs or touches the garment. Organic wrist movement, no stabilization. Model does NOT speak.`
    ),
    makeScene(3,"OUTDOOR — WIDE STATIC SHOT",
      `Photorealistic, wide shot, static camera — person wearing ${product} standing or walking naturally in outdoor setting (street, park, or building exterior), golden hour or natural daylight, full body visible, camera completely stationary. ${visualStyle}. --ar ${r} --style raw --v 6.1`,
      `[0:00-0:04] Wide shot — camera placed or propped still, completely stationary. Person wearing ${product} stands or walks naturally within the frame. Full body visible from head to toe. Camera does NOT move, pan, or tilt.`,
      `[0:04-0:08] Same static wide angle — model continues natural movement within frame (adjusting outfit, turning slightly, walking past). Camera stays completely locked off. Full outfit visible at all times. Golden hour or bright daylight.`
    ),
    makeScene(4,"CANDID SHOT — WIDE STATIC",
      `Photorealistic, wide shot, static camera — candid full-body shot of person wearing ${product} in natural indoor or outdoor setting, camera completely stationary, no movement, full outfit visible, natural ambient light. ${visualStyle}. --ar ${r} --style raw --v 6.1`,
      `[0:00-0:04] Wide static shot — camera locked off and completely still. Model wearing ${product} moves naturally within frame: walking slowly, looking around, adjusting garment. Full outfit from head to toe visible.`,
      `[0:04-0:08] Camera remains fully static. Model pauses or slows within frame — wide angle shows complete outfit in environment. ${visualStyle}. Natural light — golden hour or bright daylight.`
    ),
  ];

  // Bag 4-scene
  const bagShots = [
    makeScene(1,"INTRO — BAG ON TABLE",
      `Photorealistic, shot on smartphone, handheld UGC — ${product} placed on a wooden table or marble surface, natural daylight from window illuminating leather/fabric texture, hardware details visible. ${visualStyle}. --ar ${r} --style raw --v 6.1`,
      `[0:00-0:04] Handheld smartphone — slow side-to-side pan across ${product} placed on table. Natural light highlights material and hardware. Slight organic sway, no gimbal.`,
      `[0:04-0:08] Camera dips closer to hardware detail — close-up on clasp, zipper pull, logo, or stitching. Autofocus hunts then locks on best detail. Warm window light.`
    ),
    makeScene(2,"HARDWARE & ZIPPER DETAIL",
      `Macro close-up, shot on smartphone, handheld — extreme close-up of ${product} hardware details: zipper pull, metal clasp, stitching edges, logo embossing. ${visualStyle}. --ar ${r} --style raw --v 6.1`,
      `[0:00-0:04] Macro shot — finger touches or taps ${product} hardware (zipper, clasp, logo). Camera very close, autofocus hunts briefly then locks. Natural side light reveals material texture depth.`,
      `[0:04-0:08] Hand slowly pulls zipper or opens flap — close-up of opening motion. Slight motion blur on hand movement. Material quality revealed up close.`
    ),
    makeScene(3,"EXTERIOR REVEAL — HAND LIFT",
      `Handheld smartphone POV — hand lifting ${product} toward camera, rotating slowly to show all angles, natural ambient light creating soft shadows, authentic product hold, UGC feel. ${visualStyle}. --ar ${r} --style raw --v 6.1`,
      `[0:00-0:04] Hand lifts ${product} from below frame toward camera — front face revealed. Handheld camera follows hand motion slightly. Slow 90-degree rotation shows side and bottom.`,
      `[0:04-0:08] Hand flips ${product} to reveal back and bottom. Close-up on bottom detail or side panel. Natural light plays across material.`
    ),
    makeScene(4,"INTERIOR REVEAL",
      `Handheld smartphone POV — hand opening ${product} wide toward camera, interior lining and compartments visible, natural top-down or angled light illuminating inside, authentic UGC feel. ${visualStyle}. --ar ${r} --style raw --v 6.1`,
      `[0:00-0:04] Hand opens ${product} wide toward camera — interior reveal. Shows inner lining, pockets, and compartments. Camera slightly overhead. Natural light enters the bag.`,
      `[0:04-0:08] Camera pulls out from interior to full exterior shot. ${visualStyle}. Hand holds bag toward camera — final hero shot.`
    ),
  ];

  const reviewShots = [
    makeScene(1,"HOOK",
      `Photorealistic, shot on smartphone, handheld UGC — creator's hand reaches into frame lifting ${product} toward camera. Natural window light, bedroom setting, slightly imperfect framing. ${visualStyle}. --ar ${r} --style raw --v 6.1`,
      `[0:00-0:04] Handheld smartphone POV — creator's hand reaches up from below frame, lifting ${product} directly toward the lens. Camera slightly shaky and imperfect. Natural window light.`,
      `[0:04-0:08] Same handheld POV — camera slowly pulls back, ${product} now fully in frame. Creator's wrist rotates slightly to show front face. Organic sway. ${visualStyle}.`
    ),
    makeScene(2,"PRODUCT DETAIL",
      `Macro close-up shot on smartphone, handheld — ${product} held 5cm from lens, natural daylight from window, authentic texture visible, slightly soft focus on edges, UGC aesthetic. ${visualStyle}. --ar ${r} --style raw --v 6.1`,
      `[0:00-0:04] Macro shot rear camera — hand holds ${product} close to lens. Natural window light, slight flicker. Autofocus hunts then locks on texture and color detail. Authentic feel.`,
      `[0:04-0:08] Hand slowly rotates product, fingers touch surface to reveal detail. Slight motion blur as hand moves. Natural ambient light, no ring light.`
    ),
    makeScene(3,"DEMONSTRATION",

function getMediaType(b64) {
  const sig = b64.substring(0, 16);
  if (sig.startsWith("/9j"))    return "image/jpeg";
  if (sig.startsWith("iVBOR")) return "image/png";
  if (sig.startsWith("R0lGO")) return "image/gif";
  if (sig.startsWith("UklGR")) return "image/webp";
  return "image/jpeg";
}

  const totalScenes = niche === "fashion" ? "4" : "5";
  const klingIntroNote = isKlingAI ? " ⚠️ KLING MODE: Use Shot A / Shot B labels. Max 35 words each. No timestamps. Keywords only." : "";

  const system = `You are a professional UGC and affiliate content strategist specializing in authentic smartphone-shot content.

{"image":"...","introVideo":"...","video":"...","caption":"..."}`;

  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 8000,
      system,
      messages: [{
        role: "user",
        content: [
          { type: "image", source: { type: "base64", media_type: getMediaType(imgB64), data: imgB64 } },
          { type: "text", text: "Analyze this product and generate the three prompts." }
        ]
      }]
    })
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error.message || "API error");
  const raw = data.content.map(b => b.text || "").join("");
  let clean = raw.replace(/```json|```/g,"").trim();
  const start = clean.indexOf("{");
  let end = clean.lastIndexOf("}");
  if (start === -1) throw new Error("No JSON found in AI response.");
  if (end === -1) {
    clean = clean.slice(start);
    let inStr = false, escaped = false;
    for (let i = 0; i < clean.length; i++) {
      const ch = clean[i];
      if (escaped) { escaped = false; continue; }
      if (ch === "\\") { escaped = true; continue; }
      if (ch === '"') inStr = !inStr;
    }
    if (inStr) clean += '"';
    clean += "}";
    end = clean.length - 1;
  }
  clean = clean.slice(start, end + 1);
  try {
    return JSON.parse(clean);
  } catch(e) {
    const extract = (key) => {
      const rx = new RegExp(`"${key}"\\s*:\\s*"((?:[^"\\\\]|\\\\[\\s\\S])*)"`, "s");
      const m = clean.match(rx);
      return m ? m[1].replace(/\\n/g,"\n").replace(/\\"/g,'"') : `[Failed to parse field: ${key}]`;
    };
    return { image: extract("image"), introVideo: extract("introVideo"), video: extract("video"), caption: extract("caption") };
  }
}

// ─── STEP LOGIC ──────────────────────────────────────────────────────────────
function isFashion() { return state.form.niche === "fashion"; }

function getLastStep() { return isFashion() ? 8 : 7; }

function canNext() {
  const { step, form } = state;
  const f = isFashion();
  if (step === 1) return !!form.niche;
  if (step === 2) return f ? !!form.fashionSub : !!form.platform;
  if (step === 3) return f ? !!form.platform : !!form.contentType;
  if (step === 4) return f ? !!form.contentType : !!form.aiGen;
  if (step === 5) return f ? !!form.aiGen : !!form.tone;
  if (step === 6) return f ? !!form.tone : form.productName.trim().length > 0;
  if (step === 7) return f ? form.productName.trim().length > 0 : true;
  return true;
}

function nextStep() {
  if (state.step === getLastStep()) { handleGenerate(); return; }
  if (!isFashion() && state.step === 1) { setState({ step: 3 }); return; }
  setState({ step: state.step + 1 });
}

function prevStep() {
  if (!isFashion() && state.step === 3) { setState({ step: 1 }); return; }
  setState({ step: state.step - 1 });
}

async function handleGenerate() {
  setState({ loading: true });
  try {
    const prompts = state.imgB64
      ? await buildAIPrompt({ imgB64: state.imgB64, ...state.form })
      : buildStaticPrompt(state.form);
    setState({ result: prompts, activeTab: "intro", loading: false });
  } catch(err) {
    const msg = `Generate failed: ${err.message || "Unknown error"}.\n\nClick "New Prompt" and try again.`;
    setState({ result: { image: msg, video: msg, caption: msg, introVideo: msg }, loading: false });
  }
}

function reset() {
  setState({
    step: 0, imgB64: null, imgSrc: null, result: null, loading: false,
    activeTab: "intro", copied: "",
    form: { niche:"", fashionSub:"", platform:"", contentType:"", aiGen:"", tone:"", productName:"", productBenefit:"" }
  });
}

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const url = ev.target.result;
    setState({ imgSrc: url, imgB64: url.split(",")[1], step: 1 });
  };
  reader.readAsDataURL(file);
}

function copyText(key, label) {
  const content = state.result[key];
  if (!content) return;
  navigator.clipboard.writeText(content);
  setState({ copied: label });
  setTimeout(() => setState({ copied: "" }), 2000);
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function el(tag, attrs, ...children) {
  const element = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k.startsWith("on") && typeof v === "function") {
      element.addEventListener(k.slice(2).toLowerCase(), v);
    } else if (k === "className") {
      element.className = v;
    } else if (k === "style" && typeof v === "object") {
      Object.assign(element.style, v);
    } else {
      element.setAttribute(k, v);
    }
  }
  for (const child of children) {
    if (child == null || child === false) continue;
    if (typeof child === "string" || typeof child === "number") {
      element.appendChild(document.createTextNode(child));
    } else {
      element.appendChild(child);
    }
  }
  return element;
}

function renderHeader(subtitle) {
  return el("div", { className: "header" },
    el("div", { className: "header-eyebrow" }, "AI Content Studio"),
    el("h1", {}, "Affiliate & UGC Prompt Generator"),
    el("p", {}, subtitle || "Multi-platform · AI-powered · Ready to use")
  );
}

function renderProgress() {
  const { step } = state;
  return el("div", { className: "progress-wrap" },
    el("div", { className: "progress-bar" },
      ...STEPS.map((label, i) =>
        el("div", { className: "progress-item" },
          el("div", { className: `progress-line${i <= step ? " active" : ""}` }),
          el("span", { className: `progress-label${i === step ? " current" : ""}` }, label)
        )
      )
    )
  );
}

function renderCard(selected, onClick, accentColor, ...children) {
  const card = el("div", {
    className: `card${selected ? " selected" : ""}`,
    onClick,
  }, ...children);
  if (accentColor) card.style.borderColor = selected ? accentColor : "rgba(255,255,255,0.07)";
  return card;
}

function renderSec(title, sub, ...children) {
  return el("div", { className: "sec" },
    el("div", {},
      el("div", { className: "sec-sub" }, sub),
      el("h2", {}, title)
    ),
    ...children
  );
}

function renderThumb() {
  if (!state.imgSrc) return null;
  return el("div", { className: "thumb" }, el("img", { src: state.imgSrc, alt: "product" }));
}

function renderField(label, value, onChange, placeholder) {
  return el("div", { className: "field" },
    el("label", {}, label),
    el("input", { value, placeholder, onInput: e => onChange(e.target.value) })
  );
}

function renderNav() {
  const { step } = state;
  const enabled = canNext();
  const isLast = step === getLastStep();
  const nav = el("div", { className: "nav" });
  if (step > 0) {
    nav.appendChild(el("button", { className: "btn-back", onClick: prevStep }, "← Back"));
  }
  const nextBtn = el("button", {
    className: `btn-next ${enabled ? "enabled" : "disabled"}`,
    onClick: enabled ? nextStep : undefined,
  }, isLast ? "✦ GENERATE PROMPT" : "Lanjut →");
  nav.appendChild(nextBtn);
  return nav;
}

function renderApp() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  const { step, loading, result, form, imgSrc, isDrag } = state;
  const f = isFashion();

  // Loading screen
  if (loading) {
    app.appendChild(renderHeader());
    const body = el("div", { className: "body" },
      el("div", { className: "loading-center" },
        el("div", { className: "spinner" }),
        el("div", { className: "loading-text" }, state.imgB64 ? "Analyzing product with AI..." : "Building prompt...")
      )
    );
    app.appendChild(body);
    return;
  }

  // Result screen
  if (result) {
    app.appendChild(renderHeader("Ready-to-use output"));
    const body = el("div", { className: "body" });

    if (imgSrc) {
      body.appendChild(el("div", { className: "result-img" }, el("img", { src: imgSrc, alt: "product" })));
    }

    const tabs = [
      { key:"intro", label:"Intro" },
      { key:"video", label:"Video Prompt" },
      { key:"caption", label:"Caption" },
    ];

    const introContent = `🖼️ IMAGE PROMPT\n${"─".repeat(36)}\n${result.image || ""}\n\n🎬 INTRO VIDEO PROMPT\n${"─".repeat(36)}\n${result.introVideo || ""}`;

    const tabBar = el("div", { className: "tabs" },
      ...tabs.map(t => {
        const btn = el("button", {
          className: `tab-btn${state.activeTab === t.key ? " active" : ""}`,
          onClick: () => setState({ activeTab: t.key }),
        }, t.label);
        return btn;
      })
    );
    body.appendChild(tabBar);

    // Content area
    if (state.activeTab === "intro") {
      const outputWrap = el("div", { className: "output-wrap" });

      // Image prompt panel
      const imgPanel = el("div", { className: "panel" });
      imgPanel.appendChild(el("div", { className: "panel-label" }, "🖼️ Image Prompt"));
      const imgPre = el("pre", {}, result.image || "");
      imgPanel.appendChild(imgPre);
      const imgCopy = el("button", {
        className: `copy-btn${state.copied === "img" ? " copied" : ""}`,
        onClick: () => copyText("image", "img"),
      }, state.copied === "img" ? "✓ Copied" : "Copy");
      imgPanel.appendChild(imgCopy);
      outputWrap.appendChild(imgPanel);

      // Intro video prompt panel
      const iPanel = el("div", { className: "panel" });
      iPanel.appendChild(el("div", { className: "panel-label" }, "🎬 Intro Video Prompt"));
      const iPre = el("pre", {}, result.introVideo || "");
      iPanel.appendChild(iPre);
      const iCopy = el("button", {
        className: `copy-btn${state.copied === "ivid" ? " copied" : ""}`,
        onClick: () => copyText("introVideo", "ivid"),
      }, state.copied === "ivid" ? "✓ Copied" : "Copy");
      iPanel.appendChild(iCopy);
      outputWrap.appendChild(iPanel);

      body.appendChild(outputWrap);
    } else {
      const displayContent = result[state.activeTab];
      const panel = el("div", { className: "panel", style: { marginTop:"10px" } });
      const pre = el("pre", { className: "tall" }, displayContent || "");
      panel.appendChild(pre);
      const copyBtn = el("button", {
        className: `copy-btn${state.copied === state.activeTab ? " copied" : ""}`,
        onClick: () => copyText(state.activeTab, state.activeTab),
      }, state.copied === state.activeTab ? "✓ Copied" : "Copy");
      panel.appendChild(copyBtn);
      body.appendChild(panel);
    }

    body.appendChild(el("button", { className: "reset-btn", onClick: reset }, "↺ New Prompt"));
    app.appendChild(body);
    return;
  }

  // Wizard
  app.appendChild(renderHeader());
  app.appendChild(renderProgress());
  const body = el("div", { className: "body" });

  // Step 0: Upload
  if (step === 0) {
    const zone = el("div", {
      className: `upload-zone${isDrag ? " drag" : ""}`,
      onClick: () => document.getElementById("file-input").click(),
      onDragover: e => { e.preventDefault(); setState({ isDrag: true }); },
      onDragleave: () => setState({ isDrag: false }),
      onDrop: e => { e.preventDefault(); setState({ isDrag: false }); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); },
    },
      el("div", { className: "upload-icon" }, "📷"),
      el("div", { className: "upload-title" }, "Tap or drag product photo here"),
      el("div", { className: "upload-hint" }, "JPG · PNG · WEBP — AI reads product details automatically")
    );
    const sec = renderSec("Upload Product Photo", "Optional — AI will auto-analyze product details", zone,
      el("div", { className: "skip-btn", onClick: () => setState({ step: 1 }) }, "Skip — enter product name manually →")
    );
    body.appendChild(sec);
  }

  // Step 1: Niche
  if (step === 1) {
    body.appendChild(renderSec("Select Niche", "Category of product being promoted",
      ...(imgSrc ? [renderThumb()] : []),
      ...NICHES.map(n => renderCard(form.niche === n.id, () => set("niche", n.id), n.color,
        el("span", { style: { fontSize:"22px" } }, n.emoji),
        el("span", { className: "card-label" }, n.label)
      ))
    ));
  }

  // Step 2: Fashion sub OR Platform
  if (step === 2 && f) {
    body.appendChild(renderSec("Fashion Product Type", "Select the specific product category",
      ...(imgSrc ? [renderThumb()] : []),
      ...FASHION_SUBCATEGORIES.map(s => renderCard(form.fashionSub === s.id, () => set("fashionSub", s.id), "#b5c9f7",
        el("span", { style: { fontSize:"26px" } }, s.emoji),
        el("div", { className: "card-inner" },
          el("span", { className: "card-label" }, s.label),
          el("span", { className: "card-sub" }, s.desc)
        )
      ))
    ));
  }

  // Platform step
  if ((f && step === 3) || (!f && step === 2)) {
    body.appendChild(renderSec("Target Platform", "Where will this content be published?",
      ...PLATFORMS.map(p => renderCard(form.platform === p.id, () => set("platform", p.id), null,
        el("div", { className: "card-inner" },
          el("span", { className: "card-label" }, p.label),
          el("span", { className: "card-sub" }, `${p.ratio} · ${p.duration}`)
        )
      ))
    ));
  }

  // Content type step
  if ((f && step === 4) || (!f && step === 3)) {
    body.appendChild(renderSec("Content Type", "Storytelling format for the video",
      ...CONTENT_TYPES.map(c => renderCard(form.contentType === c.id, () => set("contentType", c.id), null,
        el("span", { style: { fontSize:"22px" } }, c.icon),
        el("div", { className: "card-inner" },
          el("span", { className: "card-label" }, c.label),
          el("span", { className: "card-sub" }, c.desc)
        )
      ))
    ));
  }

  // AI Generator step
  if ((f && step === 5) || (!f && step === 4)) {
    const grid = el("div", { className: "ai-grid" },
      ...AI_GENERATORS.map(a => {
        const card = el("div", {
          className: `ai-card${form.aiGen === a.id ? " selected" : ""}`,
          onClick: () => set("aiGen", a.id),
        },
          el("div", { className: "ai-card-label" }, a.label),
          el("div", {
            className: "ai-card-type",
            style: { color: a.type==="video"?"#88bbff":a.type==="image"?"#ff99cc":"#aaccaa" }
          }, a.type === "both" ? "Video & Image" : a.type)
        );
        return card;
      })
    );
    body.appendChild(renderSec("AI Generator", "Which AI tool will you be using?", grid));
  }

  // Tone step
  if ((f && step === 6) || (!f && step === 5)) {
    body.appendChild(renderSec("Tone & Vibe", "Visual character and content narrative",
      ...TONES.map(t => renderCard(form.tone === t.id, () => set("tone", t.id), null,
        el("span", { className: "card-label" }, t.label)
      ))
    ));
  }

  // Product Info step
  if ((f && step === 7) || (!f && step === 6)) {
    const children = [];
    if (imgSrc) children.push(renderThumb());
    if (imgSrc) children.push(el("div", { className: "photo-ok" }, "✓ Photo uploaded — AI will automatically analyze product visuals"));
    children.push(renderField("Product Name *", form.productName, v => set("productName", v), "e.g. Mini Bow Slingbag Chocolate"));
    children.push(renderField("Key Benefit", form.productBenefit, v => set("productBenefit", v), "e.g. Spacious, lightweight, perfect for daily use"));
    body.appendChild(renderSec("Product Info", "Specific details of the product being promoted", ...children));
  }

  // Confirm step
  if ((f && step === 8) || (!f && step === 7)) {
    const rows = [
      ["Product Photo", imgSrc ? "✓ Uploaded — AI auto-analysis" : "Not uploaded (manual)"],
      ["Niche",    NICHES.find(n=>n.id===form.niche)?.label || "—"],
      ...(form.niche==="fashion" ? [["Category", FASHION_SUBCATEGORIES.find(s=>s.id===form.fashionSub)?.label || "—"]] : []),
      ["Platform", PLATFORMS.find(p=>p.id===form.platform)?.label || "—"],
      ["Content",  CONTENT_TYPES.find(c=>c.id===form.contentType)?.label || "—"],
      ["AI Tool",  AI_GENERATORS.find(a=>a.id===form.aiGen)?.label || "—"],
      ["Tone",     TONES.find(t=>t.id===form.tone)?.label || "—"],
      ["Product",  form.productName || "—"],
      ["Benefit",  form.productBenefit || "—"],
    ];
    body.appendChild(renderSec("Confirm", "Review before generating",
      ...(imgSrc ? [renderThumb()] : []),
      el("div", { style: { display:"flex", flexDirection:"column", gap:"7px" } },
        ...rows.map(([k,v]) =>
          el("div", { className: "confirm-row" },
            el("span", { className: "confirm-key" }, k),
            el("span", { className: `confirm-val${k==="Product Photo"&&imgSrc?" ok":""}` }, v || "—")
          )
        )
      )
    ));
  }

  if (step > 0) body.appendChild(renderNav());
  app.appendChild(body);
}

function render() {
  renderApp();
}

// File input handler
document.getElementById("file-input").addEventListener("change", e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

// Initial render
render();
</script>
</body>
</html>
